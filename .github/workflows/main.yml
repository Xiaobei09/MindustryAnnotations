name: Sync Annotations Folder
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  sync-annotations:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
      - name: Add upstream remote
        run: git remote add upstream https://github.com/Anuken/Mindustry.git
      
      - name: Fetch upstream
        run: git fetch upstream
      
      - name: Switch to main branch
        run: |
          git checkout main
      
      - name: Sync annotations folder
        run: |
          # 从上游的 master 分支同步 annotations 文件夹到本地的 main 分支
          git checkout upstream/master -- annotations/
      
      - name: Commit and push changes
        run: |
          git add annotations/
          if ! git diff --staged --quiet; then
            git commit -m "sync: update annotations folder from upstream [skip ci]"
            git push origin main
          else
            echo "No changes in annotations folder"
          fi