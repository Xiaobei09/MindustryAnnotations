name: Sync Specific Folders from Mindustry
on:
  workflow_dispatch:  # 手动触发
  schedule: [{cron: '0 2 * * 0'}]  # 每周日

jobs:
  sync-folders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Add upstream
        run: git remote add upstream https://github.com/Anuken/Mindustry.git
      
      - name: Fetch upstream master
        run: git fetch upstream master  # 注意这里是 master
      
      - name: Sync specific folders
        run: |
          # 同步你需要的文件夹（根据 Mindustry 的实际结构调整）
          git checkout upstream/master -- annotations/
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "sync: update from Mindustry upstream"
          git push origin main  # 确保你的仓库也是 master 分支