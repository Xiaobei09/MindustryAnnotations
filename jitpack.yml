# jitpack.yml
before_install:
  - sdk install java 11
  - sdk use java 11
  - chmod +x gradlew

install:
  - ./gradlew :annotations:build :annotations:publishToMavenLocal -x test

artifacts:
  - path: annotations/build/libs/*.jar
    type: jar
  - path: annotations/build/publications/*/pom-default.xml
    type: pom